name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Grant execute permission for gradlew
        run: |
          # On Windows, we don't need chmod, but we ensure gradlew.bat exists
          if (Test-Path gradlew.bat) { Write-Host "gradlew.bat found" } else { Write-Error "gradlew.bat missing" }
        shell: pwsh

      - name: Build Fat JAR
        run: .\gradlew.bat fatJar
        
      - name: Create EXE with jpackage
        run: |
          $jarPath = Get-ChildItem -Path build/libs -Filter *.jar | Select-Object -First 1
          jpackage --input build/libs `
                   --name SwiftShare-Desktop `
                   --main-jar $jarPath.Name `
                   --main-class com.swiftshare.desktop.Main `
                   --type exe `
                   --dest installer `
                   --win-console
        shell: pwsh
      
      - name: Upload EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: SwiftShare-Desktop-Installer
          path: installer/*.exe
